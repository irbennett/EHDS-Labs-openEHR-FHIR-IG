# Build FHIR IG (SUSHI + HL7 IG Publisher) and deploy ./output to GitHub Pages.
#
# One-time repo setup:
#   Settings → Pages → Build and deployment → Source: GitHub Actions
# If your site URL is not https://ianbennett.github.io/ExampleIG_Ian/ , edit
# canonical in sushi-config.yaml to match (https://<user>.github.io/<repo>/).
#
# Troubleshooting: the summary "exit code 1" does not show which step failed.
# Open the workflow run → build job → click the step with a red X → read the log.

name: Publish IG to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

# Use Node 24 for @actions/* scripts (reduces Node 20 deprecation warnings).
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # IG Publisher is memory-heavy; default heap often OOMs on GitHub runners.
      JAVA_TOOL_OPTIONS: "-Dfile.encoding=UTF-8 -Xmx5g"
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: "Verify IG files are in the repo (fix: push missing paths)"
        run: |
          set -e
          test -f ig.ini || { echo "::error::Missing ig.ini"; exit 1; }
          test -f sushi-config.yaml || { echo "::error::Missing sushi-config.yaml"; exit 1; }
          test -d ehds-ig-template/package || { echo "::error::Missing ehds-ig-template/package — add ehds-ig-template/ to git and push"; exit 1; }
          test -d input/fsh || { echo "::error::Missing input/fsh"; exit 1; }
          echo "Layout OK"

      - name: OS packages (IG Publisher / diagrams)
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Setup Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      # npx avoids "sushi: command not found" when global npm bin is not on PATH
      - name: Run SUSHI
        run: npx --yes fsh-sushi .

      - name: Cache IG Publisher
        id: cache-publisher
        uses: actions/cache@v5
        with:
          path: input-cache/publisher.jar
          key: ig-publisher-${{ runner.os }}-v1

      - name: Download IG Publisher
        if: steps.cache-publisher.outputs.cache-hit != 'true'
        run: |
          mkdir -p input-cache
          curl -fsSL -o input-cache/publisher.jar \
            https://github.com/HL7/fhir-ig-publisher/releases/latest/download/publisher.jar

      # Publisher finishes by running `jekyll build` — Jekyll is not on ubuntu-latest by default.
      - name: Setup Ruby + Jekyll
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.3"
      - name: Install Jekyll CLI
        run: gem install jekyll --no-document && jekyll --version

      # -no-sushi: SUSHI already ran. -tx n/a: avoids flaky tx.fhir.org calls in CI (optional: remove for stricter builds).
      - name: Run IG Publisher
        run: java -jar input-cache/publisher.jar -ig . -no-sushi -tx n/a

      - name: Disable Jekyll (FHIR IG uses paths GitHub would otherwise ignore)
        run: mkdir -p output && touch output/.nojekyll

      # Stay on v3: v4 omits dotfiles by default, so .nojekyll would not reach Pages.
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
