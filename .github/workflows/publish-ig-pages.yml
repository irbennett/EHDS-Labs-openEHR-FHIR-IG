# Build FHIR IG (SUSHI + HL7 IG Publisher) and deploy ./output to GitHub Pages.
#
# One-time repo setup:
#   Settings → Pages → Build and deployment → Source: GitHub Actions
# If your site URL is not https://ianbennett.github.io/ExampleIG_Ian/ , edit
# canonical in sushi-config.yaml to match (https://<user>.github.io/<repo>/).

name: Publish IG to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # IG Publisher is memory-heavy; default heap often OOMs on GitHub runners.
      JAVA_TOOL_OPTIONS: "-Dfile.encoding=UTF-8 -Xmx5g"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: OS packages (IG Publisher / diagrams)
        run: sudo apt-get update && sudo apt-get install -y graphviz

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # npx avoids "sushi: command not found" when global npm bin is not on PATH
      - name: Run SUSHI
        run: npx --yes fsh-sushi .

      - name: Cache IG Publisher
        id: cache-publisher
        uses: actions/cache@v4
        with:
          path: input-cache/publisher.jar
          key: ig-publisher-${{ runner.os }}-v1

      - name: Download IG Publisher
        if: steps.cache-publisher.outputs.cache-hit != 'true'
        run: |
          mkdir -p input-cache
          curl -fsSL -o input-cache/publisher.jar \
            https://github.com/HL7/fhir-ig-publisher/releases/latest/download/publisher.jar

      # -no-sushi: SUSHI already ran. -tx n/a: avoids flaky tx.fhir.org calls in CI (optional: remove for stricter builds).
      - name: Run IG Publisher
        run: java -jar input-cache/publisher.jar -ig . -no-sushi -tx n/a

      - name: Disable Jekyll (FHIR IG uses paths GitHub would otherwise ignore)
        run: touch output/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: output

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
